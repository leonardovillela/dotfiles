- defaults:
    link:
        relink: true
    shell:
        stderr: true
        stdout: true
        stdin: true
- clean: ['~']
- link:
    ~/.aliases.sh:
    ~/.gitconfig:
    ~/.profile:
    ~/.zshrc:
        path: zshrc
        force: true
    ~/.tool-versions:
        path: asdf-tools-versions
- shell:
    - [sh bootstrap.sh, Running bootstrap script]
