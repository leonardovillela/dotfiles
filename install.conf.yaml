- defaults:
    link:
        relink: true
- clean: ['~']
- link:
    ~/.aliases.sh:
    ~/.gitconfig:
    ~/.hyper.js:
        path: hyper.js
        force: true
    ~/.profile:
    ~/.vimrc:
    ~/.zshrc:
        path: zshrc
        force: true
    ~/.tool-versions:
        path: asdf-tools-versions
